<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de Gastos del Hogar</title>
  <style>
    :root {
      --bg-page:      linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --bg-card:      #ffffff;
      --bg-subtle:    #f4f5f7;
      --border:       #e0e0e0;
      --text-primary: #1a1a2e;
      --text-secondary:#555;
      --text-muted:   #aaa;
      --accent:       #667eea;
      --accent2:      #764ba2;
      --green:        #11998e;
      --green2:       #38ef7d;
      --red:          #eb3349;
      --red2:         #f45c43;
      --yellow:       #f7971e;
      --yellow2:      #ffd200;
      --shadow:       rgba(0,0,0,0.12);
      --radius:       14px;
    }

    [data-theme="dark"] {
      --bg-page:      linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
      --bg-card:      #1e2235;
      --bg-subtle:    #252b3b;
      --border:       #3a4060;
      --text-primary: #e8eaf6;
      --text-secondary:#9fa8da;
      --text-muted:   #5c6180;
      --accent:       #7986cb;
      --accent2:      #9575cd;
      --green:        #26a69a;
      --green2:       #64ffda;
      --red:          #ef5350;
      --red2:         #ff1744;
      --shadow:       rgba(0,0,0,0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-page);
      min-height: 100vh;
      padding: 20px 16px 60px;
      transition: background 0.4s;
    }

    .container { max-width: 880px; margin: 0 auto; }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 10px;
    }

    h1 {
      color: #fff;
      font-size: clamp(1.2rem, 4.5vw, 1.9rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      text-shadow: 0 2px 8px rgba(0,0,0,0.25);
      flex: 1;
    }

    /* Toggle tema */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .theme-toggle .tlabel {
      color: rgba(255,255,255,0.85);
      font-size: 0.8rem;
      font-weight: 600;
    }

    .toggle-track {
      width: 46px; height: 26px;
      background: rgba(255,255,255,0.25);
      border-radius: 50px;
      position: relative;
      transition: background 0.3s;
    }

    [data-theme="dark"] .toggle-track { background: var(--accent); }

    .toggle-knob {
      position: absolute;
      top: 3px; left: 3px;
      width: 20px; height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s;
      font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    [data-theme="dark"] .toggle-knob { transform: translateX(20px); }

    /* ── CARDS ── */
    .card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: clamp(16px, 4vw, 26px);
      margin-bottom: 16px;
      box-shadow: 0 8px 28px var(--shadow);
      transition: background 0.4s, box-shadow 0.4s;
    }

    .card h2 {
      color: var(--text-primary);
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-weight: 700;
      padding-bottom: 10px;
      margin-bottom: 18px;
      border-bottom: 2px solid var(--accent);
      transition: color 0.4s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── FORM ── */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      margin-bottom: 16px;
      align-items: end;
    }

    @media (max-width: 520px) {
      .form-row { grid-template-columns: 1fr; }
      .form-row button { width: 100%; }
    }

    .field { display: flex; flex-direction: column; gap: 5px; }

    .field label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: color 0.4s;
    }

    input[type="text"],
    input[type="number"] {
      padding: 10px 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      background: var(--bg-card);
      color: var(--text-primary);
      width: 100%;
      transition: border-color 0.2s, background 0.4s, color 0.4s;
      -webkit-appearance: none;
    }

    input:focus { outline: none; border-color: var(--accent); }
    input::placeholder { color: var(--text-muted); }

    /* ── BOTONES ── */
    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      white-space: nowrap;
    }

    button:active { transform: scale(0.97); }

    @media (hover: hover) {
      button:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.2); }
    }

    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
    .btn-success { background: linear-gradient(135deg, var(--green), var(--green2)); color: #fff; }
    .btn-danger  {
      background: linear-gradient(135deg, var(--red), var(--red2));
      color: #fff;
      padding: 6px 10px;
      font-size: 0.75rem;
      border-radius: 6px;
    }
    .btn-calc {
      background: linear-gradient(135deg, var(--yellow), var(--yellow2));
      color: #333;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px 20px;
      border-radius: 12px;
      flex: 1;
    }
    .btn-clear {
      background: linear-gradient(135deg, var(--red), var(--red2));
      color: #fff;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 0.9rem;
    }

    /* ── TABLA ── */
    .table-wrap { overflow-x: auto; border-radius: 8px; margin-top: 4px; }

    table { width: 100%; border-collapse: collapse; min-width: 260px; }

    th, td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      transition: border-color 0.4s;
    }

    th {
      background: var(--bg-subtle);
      color: var(--text-secondary);
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: background 0.4s, color 0.4s;
    }

    td { color: var(--text-primary); font-size: 0.9rem; transition: color 0.4s; }
    td:first-child, th:first-child { white-space: normal; min-width: 100px; }
    tr:last-child td { border-bottom: none; }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 0.88rem;
      font-style: italic;
      transition: color 0.4s;
    }

    /* ── TOTAL BOX ── */
    .total-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-subtle);
      padding: 12px 16px;
      border-radius: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
      gap: 8px;
      transition: background 0.4s;
    }

    .total-box .tlabel { font-weight: 600; color: var(--text-primary); font-size: 0.95rem; transition: color 0.4s; }
    .total-box .tval   { font-size: 1.3rem; font-weight: 700; color: var(--accent); }

    /* ── ACCIONES ── */
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin: 4px 0 16px; }

    /* ── RESULTADO ITEM ── */
    .res-item {
      background: var(--bg-subtle);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      transition: background 0.4s;
    }

    .res-info { flex: 1; min-width: 160px; }

    .res-nombre {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text-primary);
      margin-bottom: 2px;
      transition: color 0.4s;
    }

    .res-detalle {
      font-size: 0.78rem;
      color: var(--text-secondary);
      transition: color 0.4s;
    }

    .progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 100px;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 100px;
      transition: width 0.5s ease;
    }

    .res-montos { text-align: right; }

    .res-aporte {
      font-size: clamp(1.1rem, 3.5vw, 1.3rem);
      font-weight: 800;
      color: var(--green);
    }

    .res-sobrante {
      font-size: 0.8rem;
      margin-top: 3px;
      font-weight: 600;
    }

    .sobrante-pos { color: var(--green); }
    .sobrante-neg { color: var(--red); }

    /* ── RESUMEN FINAL ── */
    .resumen-final {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .res-stat {
      background: var(--bg-card);
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      box-shadow: 0 2px 8px var(--shadow);
      transition: background 0.4s;
    }

    .res-stat .slabel { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; transition: color 0.4s; }
    .res-stat .sval   { font-size: 1.2rem; font-weight: 700; }
    .sval-green  { color: var(--green); }
    .sval-red    { color: var(--red); }
    .sval-accent { color: var(--accent); }

    @media (max-width: 400px) { .col-prop { display: none; } }
  </style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>🏠 Calculadora de Gastos del Hogar</h1>
    <div class="theme-toggle" onclick="toggleTheme()" title="Cambiar modo">
      <span class="tlabel" id="themeLabel">Oscuro</span>
      <div class="toggle-track">
        <div class="toggle-knob" id="themeKnob">🌙</div>
      </div>
    </div>
  </div>

  <!-- INTEGRANTES -->
  <div class="card">
    <h2>👥 Integrantes del Hogar</h2>
    <div class="form-row">
      <div class="field">
        <label>Nombre</label>
        <input type="text" id="iNombre" placeholder="Ej: María" />
      </div>
      <div class="field">
        <label>Ingreso mensual ($)</label>
        <input type="number" id="iIngreso" placeholder="Ej: 800000" min="0" />
      </div>
      <button class="btn-primary" onclick="addIntegrante()">Agregar</button>
    </div>
    <div id="emptyInt" class="empty">Agrega integrantes para comenzar</div>
    <div class="table-wrap" id="wrapInt" style="display:none">
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Ingreso</th>
            <th class="col-prop">Proporción</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="bodyInt"></tbody>
      </table>
    </div>
  </div>

  <!-- GASTOS -->
  <div class="card">
    <h2>💸 Gastos del Hogar</h2>
    <div class="form-row">
      <div class="field">
        <label>Descripción</label>
        <input type="text" id="gDesc" placeholder="Ej: Arriendo, Luz, Internet..." />
      </div>
      <div class="field">
        <label>Monto ($)</label>
        <input type="number" id="gMonto" placeholder="Ej: 450000" min="0" />
      </div>
      <button class="btn-success" onclick="addGasto()">Agregar</button>
    </div>
    <div id="emptyGas" class="empty">Agrega los gastos comunes del hogar</div>
    <div class="table-wrap" id="wrapGas" style="display:none">
      <table>
        <thead>
          <tr><th>Descripción</th><th>Monto</th><th></th></tr>
        </thead>
        <tbody id="bodyGas"></tbody>
      </table>
    </div>
    <div class="total-box" id="totalBox" style="display:none">
      <span class="tlabel">Total Gastos:</span>
      <span class="tval" id="totalVal">$0</span>
    </div>
  </div>

  <!-- ACCIONES -->
  <div class="actions">
    <button class="btn-calc" onclick="calcular()">📊 Calcular Distribución</button>
    <button class="btn-clear" onclick="limpiarTodo()">🗑️ Limpiar todo</button>
  </div>

  <!-- RESULTADOS -->
  <div class="card" id="resCard" style="display:none">
    <h2>📋 Distribución Proporcional</h2>
    <div id="resBody"></div>
  </div>

</div>

<script>
  const K_INT = 'hogar_integrantes_v2';
  const K_GAS = 'hogar_gastos_v2';

  let integrantes = JSON.parse(localStorage.getItem(K_INT) || '[]');
  let gastos      = JSON.parse(localStorage.getItem(K_GAS) || '[]');

  const fmt = n => '$' + Math.round(Math.abs(n)).toLocaleString('es-CL');
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  function save() {
    localStorage.setItem(K_INT, JSON.stringify(integrantes));
    localStorage.setItem(K_GAS, JSON.stringify(gastos));
  }

  /* ── TEMA ── */
  function toggleTheme() {
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next = dark ? 'light' : 'dark';
    applyTheme(next);
    localStorage.setItem('theme_hogar', next);
  }

  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    const dark = t === 'dark';
    document.getElementById('themeKnob').textContent  = dark ? '☀️' : '🌙';
    document.getElementById('themeLabel').textContent = dark ? 'Claro' : 'Oscuro';
  }

  /* Restaurar tema */
  (function() {
    const saved = localStorage.getItem('theme_hogar')
      || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    applyTheme(saved);
  })();

  /* ── INTEGRANTES ── */
  function addIntegrante() {
    const nombre  = document.getElementById('iNombre').value.trim();
    const ingreso = parseFloat(document.getElementById('iIngreso').value);
    if (!nombre)          { alert('Ingresa el nombre'); return; }
    if (!ingreso || ingreso <= 0) { alert('Ingresa un ingreso válido'); return; }
    integrantes.push({ id: Date.now(), nombre, ingreso });
    document.getElementById('iNombre').value  = '';
    document.getElementById('iIngreso').value = '';
    save(); renderInt(); hideRes();
    document.getElementById('iNombre').focus();
  }

  function delIntegrante(id) {
    integrantes = integrantes.filter(i => i.id !== id);
    save(); renderInt(); hideRes();
  }

  function renderInt() {
    const totalI = integrantes.reduce((s,i) => s + i.ingreso, 0);
    const empty  = document.getElementById('emptyInt');
    const wrap   = document.getElementById('wrapInt');
    const tbody  = document.getElementById('bodyInt');

    if (!integrantes.length) {
      empty.style.display = 'block';
      wrap.style.display  = 'none';
      return;
    }
    empty.style.display = 'none';
    wrap.style.display  = 'block';

    tbody.innerHTML = integrantes.map(i => {
      const prop = ((i.ingreso / totalI) * 100).toFixed(1);
      return `<tr>
        <td>${esc(i.nombre)}</td>
        <td>${fmt(i.ingreso)}</td>
        <td class="col-prop">${prop}%</td>
        <td><button class="btn-danger" onclick="delIntegrante(${i.id})">✕ Quitar</button></td>
      </tr>`;
    }).join('');
  }

  /* ── GASTOS ── */
  function addGasto() {
    const desc  = document.getElementById('gDesc').value.trim();
    const monto = parseFloat(document.getElementById('gMonto').value);
    if (!desc)           { alert('Ingresa la descripción'); return; }
    if (!monto || monto <= 0) { alert('Ingresa un monto válido'); return; }
    gastos.push({ id: Date.now(), desc, monto });
    document.getElementById('gDesc').value  = '';
    document.getElementById('gMonto').value = '';
    save(); renderGas(); hideRes();
    document.getElementById('gDesc').focus();
  }

  function delGasto(id) {
    gastos = gastos.filter(g => g.id !== id);
    save(); renderGas(); hideRes();
  }

  function renderGas() {
    const empty    = document.getElementById('emptyGas');
    const wrap     = document.getElementById('wrapGas');
    const tbody    = document.getElementById('bodyGas');
    const totalBox = document.getElementById('totalBox');

    if (!gastos.length) {
      empty.style.display    = 'block';
      wrap.style.display     = 'none';
      totalBox.style.display = 'none';
      return;
    }
    empty.style.display    = 'none';
    wrap.style.display     = 'block';
    totalBox.style.display = 'flex';

    const total = gastos.reduce((s,g) => s + g.monto, 0);
    document.getElementById('totalVal').textContent = fmt(total);

    tbody.innerHTML = gastos.map(g => `
      <tr>
        <td>${esc(g.desc)}</td>
        <td>${fmt(g.monto)}</td>
        <td><button class="btn-danger" onclick="delGasto(${g.id})">✕ Quitar</button></td>
      </tr>
    `).join('');
  }

  /* ── LIMPIAR ── */
  function limpiarTodo() {
    if (!integrantes.length && !gastos.length) return;
    if (!confirm('¿Borrar todos los datos guardados?')) return;
    integrantes = []; gastos = [];
    save(); renderInt(); renderGas(); hideRes();
  }

  /* ── CALCULAR ── */
  function hideRes() {
    document.getElementById('resCard').style.display = 'none';
  }

  function calcular() {
    if (!integrantes.length) { alert('Agrega al menos un integrante'); return; }
    if (!gastos.length)      { alert('Agrega al menos un gasto');      return; }

    const totalGas = gastos.reduce((s,g) => s + g.monto, 0);
    const totalIng = integrantes.reduce((s,i) => s + i.ingreso, 0);
    const body = document.getElementById('resBody');
    body.innerHTML = '';

    let totalSobrante = 0;

    integrantes.forEach(i => {
      const prop     = i.ingreso / totalIng;
      const aporte   = totalGas * prop;
      const sobrante = i.ingreso - aporte;
      totalSobrante += sobrante;

      const pct = (prop * 100).toFixed(1);
      const sobranteClass = sobrante >= 0 ? 'sobrante-pos' : 'sobrante-neg';
      const sobranteLabel = sobrante >= 0 ? `Le sobran ${fmt(sobrante)}` : `Le falta ${fmt(sobrante)}`;

      const div = document.createElement('div');
      div.className = 'res-item';
      div.innerHTML = `
        <div class="res-info">
          <div class="res-nombre">${esc(i.nombre)}</div>
          <div class="res-detalle">Ingreso: ${fmt(i.ingreso)} · ${pct}% del hogar · Paga el ${pct}% de cada gasto</div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="res-montos">
          <div class="res-aporte">${fmt(aporte)}</div>
          <div class="res-sobrante ${sobranteClass}">${sobranteLabel}</div>
        </div>
      `;
      body.appendChild(div);
    });

    /* Resumen final */
    const resumen = document.createElement('div');
    resumen.className = 'resumen-final';
    resumen.innerHTML = `
      <div class="res-stat">
        <div class="slabel">Total gastos</div>
        <div class="sval sval-red">${fmt(totalGas)}</div>
      </div>
      <div class="res-stat">
        <div class="slabel">Ingresos totales</div>
        <div class="sval sval-green">${fmt(totalIng)}</div>
      </div>
      <div class="res-stat">
        <div class="slabel">Gastos / Ingresos</div>
        <div class="sval sval-accent">${((totalGas/totalIng)*100).toFixed(1)}%</div>
      </div>
      <div class="res-stat">
        <div class="slabel">Sobrante total</div>
        <div class="sval ${totalSobrante >= 0 ? 'sval-green' : 'sval-red'}">${fmt(totalSobrante)}</div>
      </div>
    `;
    body.appendChild(resumen);

    const card = document.getElementById('resCard');
    card.style.display = 'block';
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  /* ── ENTER ── */
  document.getElementById('iIngreso').addEventListener('keypress', e => { if (e.key==='Enter') addIntegrante(); });
  document.getElementById('gMonto').addEventListener('keypress',   e => { if (e.key==='Enter') addGasto(); });

  /* ── INIT ── */
  renderInt();
  renderGas();
</script>
</body>
</html>
